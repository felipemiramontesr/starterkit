name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      # Ejecutar install en la raíz para resolver los Workspaces y omitir scripts locales como Husky.
      - run: npm install --ignore-scripts
        working-directory: .
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - name: Archive frontend artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

  backend-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - run: npm install --ignore-scripts
        working-directory: .
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  deploy-production:
    needs: [frontend-build-test, backend-build-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Download frontend artifacts
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: dist
          
      - name: Instalar cliente LFTP (Nativo Linux)
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: FTP Despliegue Zero-NodeJS via LFTP
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_SERVER }}
        run: |
          lftp -c "set ftp:ssl-allow no; open -u $FTP_USER,$FTP_PASS $FTP_HOST; mirror -v -R ./dist/ / --parallel=10"
